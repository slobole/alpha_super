identity:
  release_id: caspersky_account.pod_dv2_caspersky_account_paper_01
  user_id: caspersky_account
  pod_id: pod_dv2_caspersky_account_paper_01

deployment:
  mode: paper # allowed: paper, live
  enabled_bool: true  # set to false for safety; change to true when ready to run the pod

broker:
  account_route: DUN178957
  host_str: 127.0.0.1
  port_int: 7497  # default TWS port for live trading (7497 is for paper trading)
  client_id_int: 31
  timeout_seconds_float: 4.0


strategy:
  strategy_import_str: strategies.dv2.strategy_mr_dv2:DVO2Strategy
  data_profile_str: norgate_eod_sp500_pit # allowed: norgate_eod_sp500_pit, norgate_eod_etf_plus_vix_helper, norgate_eod_ndx_pit, intraday_1m_plus_daily_pit
  params:
    max_positions_int: 10

market:
  session_calendar_id_str: XNYS # allowed: XNYS, XTSE, XASX

schedule:
  signal_clock_str: eod_snapshot_ready # allowed: eod_snapshot_ready, month_end_snapshot_ready, pre_close_15m
  execution_policy_str: next_open_market # allowed: next_open_moo, same_day_moc, next_month_first_open, next_open_market

execution:
  pod_budget_fraction_float: 0.95
  auto_submit_enabled_bool: true  # important for automation

bootstrap:
  initial_cash_float: 1000000.0

risk:
  risk_profile_str: standard_equity_mr
